<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="ShopRecords - Premium multi-tenant retail management and offline-first POS for Indian shops." />
    <link rel="manifest" href="/manifest.json" />
    
    <title>ShopRecords - Offline POS & Retail Manager</title>

    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('SW registered!', reg);
              // Check for updates every 30 minutes
              setInterval(() => {
                reg.update();
              }, 30 * 60 * 1000);

              // Trigger reload when new SW is installed
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      console.log('New update installed. Reloading page...');
                      window.location.reload();
                    }
                  });
                }
              });
            })
            .catch(err => console.log('SW registration failed: ', err));
        });
      }
    </script>
  </body>
</html>
